name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      # write, not read: the action derives its GitHub tools from this scope, so
      # `read` makes every attempt to post the review a denial — the job still
      # goes green, having said nothing.
      pull-requests: write
      issues: write # GitHub routes top-level PR comments through the issues API
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          # --comment is what makes the skill post. Without it the review runs in
          # full and then discards its findings; it is not a no-op, it is silent.
          prompt: '/code-review:code-review --comment ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          # The plugin declares the tools it needs in its command frontmatter,
          # but that only binds when Claude Code reads it directly — the action
          # grants nothing, and Bash is off by default here. Without this the
          # review runs to completion, gets every posting call denied, and exits
          # green having said nothing (permission_denials_count in the raw log is
          # the only tell). See anthropics/claude-code#32459.
          #
          # --allowedTools REPLACES the default toolset rather than adding to it,
          # so the inspection tools have to be listed too. Omitting them left the
          # reviewer able to post but unable to read the diff, and it gave up in
          # four turns. Task matters most: the plugin's whole flow is subagents.
          claude_args: |
            --allowedTools "Read,Glob,Grep,Task,TodoWrite,mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*),Bash(gh issue view:*),Bash(gh issue list:*),Bash(gh search:*)"
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

