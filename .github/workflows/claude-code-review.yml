name: Claude Code Review

# On demand only. This used to run on every `pull_request` synchronize, i.e. on
# every push to an open PR — and one run is not one Claude call: the plugin fans
# out to three Haiku agents, five parallel Sonnet reviewers, and a Haiku scorer
# per issue found. Comment `@autoreview` on the PR to ask for one.
on:
  issue_comment:
    types: [created]

jobs:
  claude-review:
    # `issue_comment` fires for comments on issues *and* PRs; the
    # `issue.pull_request` key exists only on the PR flavour, and without it
    # `@autoreview` on a plain issue would start a review with no PR to review.
    #
    # The trigger word deliberately shares no substring with `@claude`:
    # `contains()` has no word boundaries, so `@claude-review` would also match
    # claude.yml's gate and fire both workflows off a single comment.
    if: >
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@autoreview') &&
      github.actor != 'claude[bot]' &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'COLLABORATOR')

    runs-on: ubuntu-latest
    permissions:
      contents: read
      # write, not read: the action derives its GitHub tools from this scope, so
      # `read` makes every attempt to post the review a denial — the job still
      # goes green, having said nothing.
      pull-requests: write
      issues: write # GitHub routes top-level PR comments through the issues API
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # On `issue_comment` the checkout default is the *default branch*, not
          # the PR — without this the reviewer reads main and reviews nothing.
          ref: refs/pull/${{ github.event.issue.number }}/head
          # Full history, not 1: one of the plugin's five reviewers exists to
          # read git blame, and a single commit gives it nothing to blame.
          fetch-depth: 0

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          # --comment is what makes the skill post. Without it the review runs in
          # full and then discards its findings; it is not a no-op, it is silent.
          # `github.event.pull_request.number` does not exist on issue_comment;
          # the PR number arrives as `issue.number`.
          prompt: '/code-review:code-review --comment ${{ github.repository }}/pull/${{ github.event.issue.number }}'
          # The plugin declares the tools it needs in its command frontmatter,
          # but that only binds when Claude Code reads it directly — the action
          # grants nothing, and Bash is off by default here. Without this the
          # review runs to completion, gets every posting call denied, and exits
          # green having said nothing (permission_denials_count in the raw log is
          # the only tell). See anthropics/claude-code#32459.
          #
          # --allowedTools REPLACES the default toolset rather than adding to it,
          # so the inspection tools have to be listed too. Omitting them left the
          # reviewer able to post but unable to read the diff, and it gave up in
          # four turns. Task matters most: the plugin's whole flow is subagents.
          claude_args: |
            --allowedTools "Read,Glob,Grep,Task,TodoWrite,mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*),Bash(gh issue view:*),Bash(gh issue list:*),Bash(gh search:*)"
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

