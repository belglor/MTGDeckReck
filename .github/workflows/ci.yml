name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# A feature-branch push does not trigger `push` (filtered to main), so an open PR
# gets exactly one run. Supersede in-flight runs when a PR is updated.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true # caches the uv cache, keyed on uv.lock

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Sync dependencies
        run: uv sync --frozen # Python 3.12 comes from .python-version

      # Mirrors `just check`, split into steps so a failure names its own stage.
      - name: Lint
        run: just lint

      - name: Typecheck
        run: just typecheck

      - name: Test
        run: just test
