repos:
  - repo: local
    hooks:
      # Call the project's own ruff (the version uv.lock pins) rather than a copy
      # pinned again here — one version, one place to bump, no drift from CI.
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix --force-exclude
        language: system
        types_or: [python, pyi, jupyter]
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --force-exclude
        language: system
        types_or: [python, pyi, jupyter]
      # Notebook outputs are regenerated by running the notebook, so committing
      # them only produces unreviewable diffs — and can drag corpus data into git.
      - id: nbstripout
        name: nbstripout
        entry: uv run nbstripout
        language: system
        types: [jupyter]
      - id: gitleaks
        name: gitleaks
        entry: gitleaks protect --staged --redact -v
        language: system
        pass_filenames: false
